# 範本倉庫保護：此檔只允許手動測試，避免每次推送範本時誤部署 Pages。
name: 手動測試 Jekyll Pages 範本

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages-template-test"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 取回程式碼
        uses: actions/checkout@v4
      - name: 設定 Pages
        uses: actions/configure-pages@v5
      - name: 建置 Jekyll 範本
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site
      - name: 上傳建置成果
        uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: 手動部署至 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
